# ─────────────────────────────────────────────────────────────────────────────
# Nzila OS — Approval Policies
# ─────────────────────────────────────────────────────────────────────────────
#
# Multi-party approval requirements for sensitive mutations.
# Enforced by the policy engine before action execution.
#
version: "1.0"
lastUpdated: "2026-03-04"

policies:
  - id: approval-payout
    name: High-value payout approval
    version: "1.0"
    type: approval
    description: >
      Payouts above $10,000 require dual approval from finance_admin
      and platform_admin roles.
    enabled: true
    scope:
      environments: [pilot, prod]
      resources: ["/api/finance/payouts"]
    rules:
      - id: high-value-payout
        description: Payouts above $10,000 require dual approval
        conditions:
          - field: context.amount
            operator: gt
            value: 10000
        effect: require_approval
        severity: critical
        requireApprovers: 2
        approverRoles: [finance_admin, platform_admin]

      - id: medium-value-payout
        description: Payouts above $1,000 require single approval
        conditions:
          - field: context.amount
            operator: gt
            value: 1000
          - field: context.amount
            operator: lte
            value: 10000
        effect: require_approval
        severity: warning
        requireApprovers: 1
        approverRoles: [finance_admin]

  - id: approval-config-change
    name: Platform configuration change approval
    version: "1.0"
    type: approval
    description: >
      Changes to platform configuration require approval in production.
    enabled: true
    scope:
      environments: [prod]
      resources: ["/api/admin/config"]
    rules:
      - id: config-change-approval
        description: Configuration changes require platform_admin approval
        conditions:
          - field: action
            operator: eq
            value: config.update
        effect: require_approval
        severity: warning
        requireApprovers: 1
        approverRoles: [platform_admin]
