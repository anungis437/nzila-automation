# ──────────────────────────────────────────────────────────────────────────────
# Platform Package Ownership Registry
#
# Every platform-* package must have a declared owner team and a steward
# (individual accountable for API stability and maintenance).
#
# Teams:
#   @nzila/platform    — Core platform infrastructure
#   @nzila/ai          — AI/ML capabilities
#   @nzila/ops         — Observability, deploy, cost
#   @nzila/governance  — Compliance, evidence, policy
#   @nzila/commerce    — Commerce verticals
#   @nzila/mobility    — Mobility domain
#
# Review: quarterly (next: 2026-06-10)
# ──────────────────────────────────────────────────────────────────────────────

version: "1.0"
lastUpdated: "2026-03-11"

