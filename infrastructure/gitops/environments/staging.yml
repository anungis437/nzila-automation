# Staging Environment Configuration
# Nzila OS — GitOps

environment: staging
region: eastus
resource_group: nzila-staging-rg

container_apps:
  environment: nzila-staging-env
  revision_mode: Multiple
  min_replicas: 2
  max_replicas: 5

apps:
  web:
    image_tag: "${VERSION}"
    port: 3000
    cpu: 0.5
    memory: 1Gi
    env:
      - name: NODE_ENV
        value: production
      - name: NEXT_PUBLIC_APP_ENV
        value: staging

  console:
    image_tag: "${VERSION}"
    port: 3001
    cpu: 0.5
    memory: 1Gi
    env:
      - name: NODE_ENV
        value: production

  partners:
    image_tag: "${VERSION}"
    port: 3002
    cpu: 0.5
    memory: 1Gi
    env:
      - name: NODE_ENV
        value: production

  union-eyes:
    image_tag: "${VERSION}"
    port: 3003
    cpu: 0.5
    memory: 1Gi
    env:
      - name: NODE_ENV
        value: production

  abr:
    image_tag: "${VERSION}"
    port: 3004
    cpu: 0.5
    memory: 1Gi
    env:
      - name: NODE_ENV
        value: production

  orchestrator-api:
    image_tag: "${VERSION}"
    port: 4000
    cpu: 0.5
    memory: 1Gi
    env:
      - name: NODE_ENV
        value: production

database:
  name: nzila-staging-db
  sku: Standard_B2s
  tier: Burstable
  version: '15'
  storage_gb: 32
  backup_retention_days: 7
  high_availability: false

acr:
  name: nzilastagingacr
  sku: Basic

key_vault:
  name: nzila-staging-kv

monitoring:
  sampling_percentage: 50
  retention_days: 60

quotas:
  max_orgs: 200
  max_ai_requests_per_day: 50000
  max_storage_gb: 500
  max_compute_hours_per_day: 120
