apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: orchestrator-api
  description: Central API orchestrator — rate-limited, helmet-secured Fastify service
  annotations:
    github.com/project-slug: anungis437/nzila-os
    backstage.io/techdocs-ref: dir:./docs
    nzila.app/port: "3100"
    nzila.app/stack: fastify
    nzila.app/tenant-scoped: "true"
  tags:
    - fastify
    - api
    - orchestrator
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: nzila-os
  providesApis:
    - orchestrator-api
  dependsOn:
    - resource:default/postgres-db
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: orchestrator-api
  description: Nzila orchestrator REST API — procurement packs, evidence, platform operations
  annotations:
    github.com/project-slug: anungis437/nzila-os
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: nzila-os
  definition: |
    openapi: "3.1.0"
    info:
      title: Nzila Orchestrator API
      version: "1.0.0"
    servers:
      - url: http://localhost:3100
    paths:
      /health:
        get:
          summary: Health check
          responses:
            "200":
              description: OK
