apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: console
  description: Internal ops console — governance, finance, ML, AI, NACP integrity, compliance
  annotations:
    github.com/project-slug: anungis437/nzila-os
    backstage.io/techdocs-ref: dir:./docs
    nzila.app/port: "3001"
    nzila.app/stack: nextjs
    nzila.app/tenant-scoped: "true"
  tags:
    - nextjs
    - internal
    - governance
    - finance
    - ai
spec:
  type: service
  lifecycle: production
  owner: platform-team
  system: nzila-os
  dependsOn:
    - resource:default/postgres-db
    - resource:default/azure-blob
    - resource:default/redis-cache
  consumesApis:
    - orchestrator-api
