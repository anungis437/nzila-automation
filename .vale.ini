# ─────────────────────────────────────────────────────────
# Vale — Nzila OS documentation quality gates
# Runs in CI via `vale docs/ content/ *.md`
# ─────────────────────────────────────────────────────────

StylesPath = .vale/styles

# Minimum alert level: suggestion, warning, error
MinAlertLevel = warning

# Vocabulary — custom terms that Vale should accept
Vocab = Nzila

# ─── Packages ────────────────────────────────────────────
# Install via: vale sync
Packages = Google, write-good

# ─── Global settings ────────────────────────────────────
[*.md]
BasedOnStyles = Vale, Google, write-good

# Disable noisy rules
Google.Exclamation = NO
Google.Spacing = NO
Google.We = suggestion
write-good.Passive = suggestion
write-good.TooWordy = warning
write-good.Weasel = warning

# ─── Changelogs and generated content ───────────────────
[CHANGELOG.md]
BasedOnStyles = Vale

[coverage/**]
BasedOnStyles = Vale

[demo-output/**]
BasedOnStyles = Vale
