name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  ENVIRONMENT: PREVIEW

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Preview Build & Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Preview deploy
        run: |
          echo "Preview deployment for PR #${{ github.event.pull_request.number }}"
          echo "Preview environments are ephemeral and expire automatically."
          # Actual preview deploy integration would go here (e.g., Vercel, Azure SWA)
