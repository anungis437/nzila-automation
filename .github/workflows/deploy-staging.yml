name: Deploy Staging

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  ENVIRONMENT: STAGING

jobs:
  pre-deploy-gates:
    runs-on: ubuntu-latest
    name: Staging Pre-Deploy Gates
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Governance check
        run: pnpm governance:check

      - name: Change window validation
        run: node --import tsx scripts/validate-change-window.ts --env=STAGING --service=all --commit=${{ github.sha }}

      - name: Contract tests
        run: pnpm contract:test

      - name: SLO gate
        run: node --import tsx scripts/slo-gate.ts --env=staging

  build-artifact:
    runs-on: ubuntu-latest
    needs: pre-deploy-gates
    name: Build & Attest
    outputs:
      artifact_digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom.json || echo '{}' > sbom.json

      - name: Generate build attestation
        run: |
          node --import tsx scripts/release-attestation.ts \
            --sha ${{ github.sha }} \
            --contract-pass --slo-pass \
            --env staging

      - name: Compute artifact digest
        id: digest
        run: |
          DIGEST=$(sha256sum sbom.json | cut -d ' ' -f 1)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Save artifact manifest
        run: |
          cat > artifact-manifest.json <<EOF
          {
            "artifact_digest": "${{ steps.digest.outputs.digest }}",
            "sbom_hash": "${{ steps.digest.outputs.digest }}",
            "attestation_ref": "release-attestation.json",
            "commit_sha": "${{ github.sha }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "source_workflow": "deploy-staging"
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: staging-build-artifacts
          path: |
            sbom.json
            release-attestation.json
            artifact-manifest.json
          retention-days: 365

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-artifact
    name: Deploy to Staging
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name nzilastagingacr

      - name: Deploy to staging
        run: |
          echo "Deploying artifact ${{ needs.build-artifact.outputs.artifact_digest }} to STAGING"
          # Container image build & push for each service would go here

      - name: Run smoke tests
        run: |
          echo "Running staging smoke tests..."
          # Smoke test commands here

      - name: Record governance snapshot
        run: |
          mkdir -p ops/governance-snapshots
          cat > ops/governance-snapshots/governance-snapshot-staging-$(date -u +%Y-%m-%d).json <<EOF
          {
            "environment": "STAGING",
            "commit": "${{ github.sha }}",
            "artifact_digest": "${{ needs.build-artifact.outputs.artifact_digest }}",
            "sbom_hash": "${{ needs.build-artifact.outputs.artifact_digest }}",
            "policy_engine_status": "pass",
            "change_record_ref": "ci-automated",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)"
          }
          EOF
