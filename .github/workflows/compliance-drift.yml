##
# Compliance Drift Detection
#
# Detects governance drift across target apps.
# Runs on every push to main and weekly scheduled checks.
# Requires 'governance-approved' label on PRs that change governance paths.
##

name: Compliance Drift

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/platform-*/**'
      - 'ops/policies/**'
      - 'governance/**'
      - 'docs/GOVERNANCE_ARCHITECTURE.md'
      - 'security/**'
      - 'ops/compliance/**'
      - 'ops/slo-policy.yml'
  pull_request:
    paths:
      - 'ops/policies/**'
      - 'governance/**'
      - 'docs/GOVERNANCE_ARCHITECTURE.md'
      - 'security/**'
  schedule:
    - cron: '0 4 * * 1' # Weekly Monday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  governance-check:
    name: Governance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run governance check
        run: pnpm governance:check

      - name: Upload governance report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: governance-drift-report
          path: governance-report.json
          retention-days: 30

  require-governance-approval:
    name: Governance Approval Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for governance-approved label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('governance-approved')) {
              core.setFailed(
                'PR modifies governance-sensitive paths. Add the "governance-approved" label after review.'
              );
            }
