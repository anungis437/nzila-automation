name: Deploy Union Eyes (Azure Container Apps)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/union-eyes/**'
      - 'packages/db/**'
      - 'packages/config/**'
      - 'packages/commerce-core/**'
      - 'packages/commerce-services/**'
      - 'packages/payments-stripe/**'

permissions:
  contents: read

env:
  APP_NAME: nzila-os-union-eyes
  IMAGE: nzilastagingacr.azurecr.io/nzila-os-union-eyes
  BACKEND_IMAGE: nzilastagingacr.azurecr.io/nzila-os-union-eyes-backend

jobs:
  pre-deploy-gates:
    runs-on: ubuntu-latest
    name: Pre-Deploy Gates
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache@v5
        with:
          path: node_modules/.cache/turbo
          key: turbo-deploy-ue-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-deploy-ue-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            turbo-deploy-ue-${{ runner.os }}-

      - name: Governance check
        run: pnpm governance:check

      - name: Change window validation
        run: node --import tsx scripts/validate-change-window.ts --env=STAGING --service=union-eyes --commit=${{ github.sha }}

      - name: Run contract tests (fail closed)
        id: contract_tests
        run: pnpm contract:test

      - name: SLO gate (fail closed)
        id: slo_gate
        run: node --import tsx scripts/slo-gate.ts --env=pilot

      - name: Generate SLO summary
        if: always()
        run: node --import tsx scripts/slo-gate.ts --env=pilot > slo-summary.txt 2>&1 || true

      - name: Upload SLO summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slo-summary-union-eyes
          path: slo-summary.txt
          retention-days: 90

      - name: Generate release attestation
        if: always()
        run: |
          CONTRACT_FLAG="--contract-pass"
          SLO_FLAG="--slo-pass"
          if [ "${{ steps.contract_tests.outcome }}" = "failure" ]; then
            CONTRACT_FLAG="--contract-fail"
          fi
          if [ "${{ steps.slo_gate.outcome }}" = "failure" ]; then
            SLO_FLAG="--slo-fail"
          fi
          node --import tsx scripts/release-attestation.ts \
            --sha ${{ github.sha }} \
            $CONTRACT_FLAG $SLO_FLAG \
            --env pilot

      - name: Upload release attestation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-attestation-union-eyes
          path: release-attestation.json
          retention-days: 365

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: pre-deploy-gates
    name: Build & Deploy Union Eyes
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name nzilastagingacr

      - name: Build & push frontend image
        run: |
          docker build \
            --target union-eyes \
            --build-arg TURBO_FILTER="--filter=@nzila/union-eyes" \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PK_UNION_EYES }} \
            --build-arg NEXT_PUBLIC_APP_URL=${{ secrets.UE_APP_URL }} \
            --build-arg NEXT_PUBLIC_CLERK_IS_SATELLITE=true \
            --build-arg NEXT_PUBLIC_CLERK_DOMAIN=nzila-os-union-eyes.delightfulisland-0d503d3c.eastus.azurecontainerapps.io \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Build & push backend image
        run: |
          az acr build \
            --registry nzilastagingacr \
            --image nzila-os-union-eyes-backend:${{ github.sha }} \
            --image nzila-os-union-eyes-backend:latest \
            --file apps/union-eyes/backend/Dockerfile \
            apps/union-eyes/backend

      - name: Update Container App (frontend + backend sidecar)
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --set-env-vars \
              "DJANGO_API_URL=http://localhost:8000" \
              "NEXT_PUBLIC_CLERK_IS_SATELLITE=true" \
              "NEXT_PUBLIC_CLERK_DOMAIN=nzila-os-union-eyes.delightfulisland-0d503d3c.eastus.azurecontainerapps.io" \
            --container-name ${{ env.APP_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }}
          # Backend runs migrations automatically on startup (Dockerfile CMD)
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --container-name django-backend \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
