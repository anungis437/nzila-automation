name: Deploy Web (Azure Container Apps)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/ui/**'
      - 'packages/config/**'
      - 'content/public/**'

permissions:
  contents: read

env:
  APP_NAME: nzila-os-web
  IMAGE: nzilastagingacr.azurecr.io/nzila-os-web

jobs:
  pre-deploy-gates:
    runs-on: ubuntu-latest
    name: Pre-Deploy Gates
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run contract tests (fail closed)
        id: contract_tests
        run: pnpm contract:test

      - name: SLO gate (fail closed)
        id: slo_gate
        run: node --import tsx scripts/slo-gate.ts --env=prod

      - name: Generate SLO summary
        if: always()
        run: node --import tsx scripts/slo-gate.ts --env=prod > slo-summary.txt 2>&1 || true

      - name: Upload SLO summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slo-summary-web
          path: slo-summary.txt
          retention-days: 90

      - name: Generate release attestation
        if: always()
        run: |
          CONTRACT_FLAG="--contract-pass"
          SLO_FLAG="--slo-pass"
          if [ "${{ steps.contract_tests.outcome }}" = "failure" ]; then
            CONTRACT_FLAG="--contract-fail"
          fi
          if [ "${{ steps.slo_gate.outcome }}" = "failure" ]; then
            SLO_FLAG="--slo-fail"
          fi
          node --import tsx scripts/release-attestation.ts \
            --sha ${{ github.sha }} \
            $CONTRACT_FLAG $SLO_FLAG \
            --env prod

      - name: Upload release attestation
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-attestation-web
          path: release-attestation.json
          retention-days: 365

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: pre-deploy-gates
    name: Build & Deploy Web
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name nzilastagingacr

      - name: Build & push image
        run: |
          docker build \
            --target web \
            --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.CLERK_PUBLISHABLE_KEY }} \
            --build-arg NEXT_PUBLIC_CONSOLE_URL=https://nzila-os-console.delightfulisland-0d503d3c.eastus.azurecontainerapps.io \
            --build-arg NEXT_PUBLIC_PARTNERS_URL=https://nzila-os-partners.delightfulisland-0d503d3c.eastus.azurecontainerapps.io \
            --build-arg NEXT_PUBLIC_UNION_EYES_URL=https://nzila-os-union-eyes.delightfulisland-0d503d3c.eastus.azurecontainerapps.io \
            --build-arg NEXT_PUBLIC_ABR_URL=https://nzila-os-abr.delightfulisland-0d503d3c.eastus.azurecontainerapps.io \
            --build-arg NEXT_PUBLIC_CFO_URL=https://nzila-os-cfo.delightfulisland-0d503d3c.eastus.azurecontainerapps.io \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ github.sha }}
