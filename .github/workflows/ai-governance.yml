##
# AI Governance Pipeline
#
# Validates AI/ML model governance compliance:
# - Model card completeness
# - Risk classification consistency
# - NIST AI RMF alignment
# - AI policy enforcement
#
# Runs on every PR that touches AI-related code.
##

name: AI Governance

on:
  pull_request:
    paths:
      - 'packages/ai-core/**'
      - 'packages/ai-sdk/**'
      - 'packages/ai-registry/**'
      - 'packages/ml-core/**'
      - 'packages/ml-sdk/**'
      - 'governance/ai/**'
      - 'apps/*/lib/ai/**'
      - 'apps/*/app/api/ai/**'
  push:
    branches: [main]
    paths:
      - 'packages/ai-core/**'
      - 'packages/ai-registry/**'
      - 'packages/ml-core/**'
      - 'governance/ai/**'
  schedule:
    # Weekly AI governance audit — Tuesdays 07:00 UTC
    - cron: '0 7 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  # ── AI Code Quality ──────────────────────────────────────────────────────
  ai-lint:
    runs-on: ubuntu-latest
    name: AI Code Quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck AI packages
        run: |
          pnpm --filter @nzila/ai-core typecheck
          pnpm --filter @nzila/ai-sdk typecheck
          pnpm --filter @nzila/ai-registry typecheck
          pnpm --filter @nzila/ml-core typecheck
          pnpm --filter @nzila/ml-sdk typecheck

      - name: Run AI tests
        run: |
          pnpm --filter @nzila/ai-core test
          pnpm --filter @nzila/ai-registry test

  # ── SDK Boundary Enforcement ──────────────────────────────────────────────
  sdk-boundary:
    runs-on: ubuntu-latest
    name: SDK Boundary Check
    steps:
      - uses: actions/checkout@v4

      - name: Check for direct provider imports in apps
        run: |
          echo "=== Checking for prohibited direct AI provider imports ==="
          VIOLATIONS=0

          # Apps must not import directly from ai-core providers or raw OpenAI/Azure SDK
          for pattern in \
            "from.*@nzila/ai-core/providers" \
            "from.*openai" \
            "from.*@azure/openai" \
            "from.*anthropic"; do
            FOUND=$(grep -rn "$pattern" apps/ --include="*.ts" --include="*.tsx" \
              | grep -v node_modules \
              | grep -v ".test." \
              | grep -v "instrumentation.ts" \
              || true)
            if [[ -n "$FOUND" ]]; then
              echo "::error::Direct provider import found (use @nzila/ai-sdk instead):"
              echo "$FOUND"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done

          if [[ "$VIOLATIONS" -gt 0 ]]; then
            echo "::error::$VIOLATIONS SDK boundary violations found"
            exit 1
          fi
          echo "No SDK boundary violations — apps correctly use @nzila/ai-sdk."

  # ── AI Safety Audit ──────────────────────────────────────────────────────
  safety-audit:
    runs-on: ubuntu-latest
    name: AI Safety Audit
    steps:
      - uses: actions/checkout@v4

      - name: Verify PII redaction is enforced
        run: |
          echo "=== Verifying PII redaction enforcement ==="

          # Check that redact.ts exports are used in gateway
          if ! grep -q "redact" packages/ai-core/src/gateway.ts; then
            echo "::warning::PII redaction may not be integrated in AI gateway"
          fi

          # Verify redaction patterns cover required categories
          REQUIRED_PATTERNS=("SSN" "credit.card" "email" "phone")
          for p in "${REQUIRED_PATTERNS[@]}"; do
            if ! grep -qi "$p" packages/ai-core/src/redact.ts; then
              echo "::error::Missing PII pattern: $p"
            fi
          done
          echo "PII redaction patterns verified."

      - name: Verify hash-chained audit logging
        run: |
          echo "=== Verifying hash-chained audit trail ==="
          if grep -q "computeEntryHash" packages/ai-core/src/logging.ts; then
            echo "Hash-chained audit logging: ✅ present"
          else
            echo "::warning::Hash-chained audit logging may not be implemented"
          fi

      - name: Verify governance documentation
        run: |
          echo "=== Verifying AI governance documentation ==="
          REQUIRED_DOCS=(
            "governance/ai/AI_SAFETY_PROTOCOLS.md"
            "governance/ai/AI_DATA_GOVERNANCE.md"
            "governance/ai/AI_MODEL_MANAGEMENT.md"
            "governance/ai/PROMPT_ENGINEERING_STANDARDS.md"
          )
          MISSING=0
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [[ ! -f "$doc" ]]; then
              echo "::error::Missing governance doc: $doc"
              MISSING=$((MISSING + 1))
            fi
          done
          if [[ "$MISSING" -eq 0 ]]; then
            echo "All required governance documentation present."
          fi
